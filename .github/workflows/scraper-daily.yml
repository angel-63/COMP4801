name: Daily Job Scraper

on:
  schedule:
    - cron: '5 0/1 * * *'     # 16: for 00:00 UTC+8; 5 0/1: for testing
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [linkedin, jobsdb]     # run in parallel
    
    env:
      MONGO_URI: ${{ secrets.MONGODB_URI }}
      MONGO_DB: ${{ secrets.MONGODB_NAME }}

    steps:
      - uses: actions/checkout@v4
        name: Checkout repository

      - uses: actions/setup-python@v5
        name: Set up Python
        with:
          python-version: '3.12.2'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper for site ${{ matrix.site }}
        run: python run.py scraper --module both --site ${{ matrix.site }}